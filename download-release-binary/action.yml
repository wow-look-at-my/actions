name: Download Release Binary
version: 1
description: Download a platform-specific binary from a GitHub release

inputs:
  repo:
    description: 'Repository (owner/name) to download from'
    required: true
  name:
    description: 'Binary name — filters the asset ({name}_{os}_{arch}) and names the result. If omitted, matches any asset and derives name by stripping the platform suffix.'
    required: false
  version:
    description: 'Release tag to download (omit or set to "latest" for the most recent release)'
    required: false
    default: 'latest'
  token:
    description: 'GitHub token for API authentication (e.g. github.token)'
    required: true

outputs:
  path:
    description: 'Full path to the downloaded binary'

runs:
  using: node24
  main: index.js
