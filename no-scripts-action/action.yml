name: 'No Scripts Check'
description: 'Ensures package.json files do not contain scripts sections (use justfiles instead)'
author: 'PazerOP'

branding:
  icon: 'alert-circle'
  color: 'orange'

inputs:
  path:
    description: 'Directory to check (defaults to repository root)'
    required: false
    default: '.'

  exclude:
    description: 'Glob patterns for directories to exclude (newline or comma separated)'
    required: false
    default: |
      **/node_modules/**
      **/.git/**

  fail-on-violation:
    description: 'Fail the action if violations are found'
    required: false
    default: 'true'

outputs:
  files-checked:
    description: 'Number of package.json files checked'

  files-with-scripts:
    description: 'Number of package.json files with scripts sections'

  violation-list:
    description: 'JSON array of files with scripts sections'

runs:
  using: 'node20'
  main: 'dist/index.js'
