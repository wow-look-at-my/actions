name: 'No Scripts Check'
description: 'Ensures package.json files do not contain scripts sections (use justfiles instead)'
author: 'wow-look-at-my'
version: '1.0.0'

branding:
  icon: 'alert-circle'
  color: 'orange'

inputs:
  path:
    description: 'Directory to check (defaults to repository root)'
    required: false
    default: '.'

  exclude:
    description: 'Glob patterns for directories to exclude (newline or comma separated)'
    required: false
    default: |
      **/node_modules/**
      **/.git/**

  fail-on-violation:
    description: 'Fail the action if violations are found'
    required: false
    default: 'true'

outputs:
  files-checked:
    description: 'Number of package.json files checked'
    value: ${{ steps.run.outputs.files-checked }}

  files-with-scripts:
    description: 'Number of package.json files with scripts sections'
    value: ${{ steps.run.outputs.files-with-scripts }}

  violation-list:
    description: 'JSON array of files with scripts sections'
    value: ${{ steps.run.outputs.violation-list }}

runs:
  using: 'composite'
  steps:
    - name: Run no-scripts check
      id: run
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_FAIL-ON-VIOLATION: ${{ inputs.fail-on-violation }}
      run: ${{ github.action_path }}/dist/no-scripts-check
