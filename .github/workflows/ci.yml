name: CI

on:
  push:

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml files
        uses: ./action-validator

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        action: [tag-runner]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.action }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.action }}
        run: npm ci

      - name: Type check
        working-directory: ${{ matrix.action }}
        run: npx tsc --noEmit

      - name: Build
        working-directory: ${{ matrix.action }}
        run: npm run build

      - name: Check for uncommitted changes
        working-directory: ${{ matrix.action }}
        run: |
          if ! git diff --quiet index.js; then
            echo "::error::index.js is out of date. Run 'npm run build' and commit."
            git diff index.js
            exit 1
          fi
