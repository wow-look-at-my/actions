name: Release Actions

on:
  push:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup orphaned branch tags
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./orphan-release/orphan-cleanup.sh

  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README is up-to-date
        run: |
          ./generate-readme.sh > README.md.tmp
          if ! diff -q README.md README.md.tmp > /dev/null 2>&1; then
            echo "::error::README.md is out of date. Run ./generate-readme.sh > README.md and commit the result."
            diff README.md README.md.tmp || true
            exit 1
          fi
          rm README.md.tmp

  no-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: extractions/setup-just@v2
      - name: Build no-scripts-action
        working-directory: no-scripts-action
        run: just build
      - uses: ./no-scripts-action

  test-cache-rg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rg via cache-rg
        id: install
        uses: ./cache-rg
      - name: Verify rg works and is on PATH at the advertised location
        run: |
          set -euo pipefail
          rg --version
          actual="$(command -v rg)"
          expected="${{ steps.install.outputs.path }}"
          if [ "$actual" != "$expected" ]; then
            echo "::error::rg on PATH ($actual) does not match advertised path ($expected)"
            exit 1
          fi

  validate-slugs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate action slugs
        run: |
          repo="${{ github.repository }}"
          errors=0

          # Correct format:   repo@action-name#ref
          # Wrong format:     repo/action-name@ref
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            num=$(echo "$line" | cut -d: -f2)
            match=$(echo "$line" | cut -d: -f3- | sed 's/^[[:space:]]*//')
            slug=$(echo "$match" | grep -oP "(?<=${repo}/)[^@/]+" || true)
            echo "::error file=${file},line=${num}::Wrong action slug format '${slug}' — use ${repo}@${slug}#ref instead of ${repo}/${slug}@ref"
            errors=$((errors + 1))
          done < <(grep -rn "${repo}/[a-zA-Z0-9_-]*@" --include='*.yml' --include='*.yaml' --include='*.md' . || true)

          if [ "$errors" -gt 0 ]; then
            exit 1
          fi

  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.find.outputs.node }}
      composite: ${{ steps.find.outputs.composite }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          node() {
            find . -name action.yml -not -path './.github/*' -printf '%h\n' | sed 's|^\./||' | while read -r n; do
              [ -f "$n/package.json" ] && echo "$n"
            done
          }
          composite() {
            find . -name action.yml -not -path './.github/*' -printf '%h\n' | sed 's|^\./||' | while read -r n; do
              [ ! -f "$n/package.json" ] && echo "$n"
            done
          }
          echo "node=$(node | jq -R | jq -sc)" >> $GITHUB_OUTPUT
          echo "composite=$(composite | jq -R | jq -sc)" >> $GITHUB_OUTPUT

  release-node:
    needs: [cleanup, detect]
    if: needs.detect.outputs.node != '[]'
    strategy:
      fail-fast: false
      matrix:
        action: ${{ fromJson(needs.detect.outputs.node) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: extractions/setup-just@v2

      - name: Build
        working-directory: ${{ matrix.action }}
        run: just build

      - name: Validate action.yml
        run: |
          action="${{ matrix.action }}"
          version=$(yq '.version' "$action/action.yml")
          if [ "$version" = "null" ] || [ -z "$version" ]; then
            echo "::error::$action/action.yml is missing required 'version' field"
            exit 1
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

          main=$(yq '.runs.main' "$action/action.yml")
          if [ "$main" != "null" ] && [ -n "$main" ]; then
            if [ ! -f "$action/$main" ]; then
              echo "::error::$action/action.yml runs.main points to '$main' which does not exist"
              exit 1
            fi
          fi

          for field in pre post; do
            file=$(yq ".runs.$field" "$action/action.yml")
            if [ "$file" != "null" ] && [ -n "$file" ]; then
              if [ ! -f "$action/$file" ]; then
                echo "::error::$action/action.yml runs.$field points to '$file' which does not exist"
                exit 1
              fi
            fi
          done
        id: version

      - name: Validate JS files are parseable
        working-directory: ${{ matrix.action }}
        run: |
          for field in main pre post; do
            file=$(yq ".runs.$field" action.yml)
            if [ "$file" != "null" ] && [ -n "$file" ]; then
              echo "Checking runs.$field: $file"
              node --check "$file"
            fi
          done

      - name: Create orphan tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          ./orphan-release/orphan-release.sh
          --source "${{ matrix.action }}"
          --version "${{ steps.version.outputs.version }}"
          --exclude "src node_modules tsconfig.json justfile package.json pnpm-lock.yaml"
          --include-branch

  release-composite:
    needs: [cleanup, detect]
    if: needs.detect.outputs.composite != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create orphan tags
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          for action in $(echo '${{ needs.detect.outputs.composite }}' | jq -r '.[]'); do
            version=$(yq '.version' "$action/action.yml")
            if [ "$version" = "null" ] || [ -z "$version" ]; then
              echo "::error::$action/action.yml is missing required 'version' field"
              exit 1
            fi
            ./orphan-release/orphan-release.sh --source "$action" --version "$version" --include-branch
          done

