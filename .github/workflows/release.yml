name: Release Actions

on:
  push:
  delete:
  workflow_dispatch:

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: git fetch --tags
      - name: Delete branch tags
        run: |
          branch="${{ github.event.ref }}"
          git tag -l "*/$branch@*" | while read tag; do
            echo "Deleting tag: $tag"
            git push origin --delete "$tag" || true
          done

  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.find.outputs.node }}
      composite: ${{ steps.find.outputs.composite }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          node() {
            for d in */action.yml; do
              n=$(dirname "$d")
              [ -f "$n/package.json" ] && echo "$n"
            done
          }
          composite() {
            for d in */action.yml; do
              n=$(dirname "$d")
              [ ! -f "$n/package.json" ] && echo "$n"
            done
          }
          echo "node=$(node | jq -R | jq -sc)" >> $GITHUB_OUTPUT
          echo "composite=$(composite | jq -R | jq -sc)" >> $GITHUB_OUTPUT

  release-node:
    needs: detect
    if: needs.detect.outputs.node != '[]'
    strategy:
      fail-fast: false
      matrix:
        action: ${{ fromJson(needs.detect.outputs.node) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: extractions/setup-just@v2

      - name: Build
        working-directory: ${{ matrix.action }}
        run: just build

      - name: Get version and tag
        id: version
        run: |
          version=$(jq -r '.version | split(".")[0]' ${{ matrix.action }}/package.json)
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "tag=${{ matrix.action }}@v$version" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ matrix.action }}/${{ github.ref_name }}@v$version" >> $GITHUB_OUTPUT
          fi

      - uses: ./orphan-tag
        with:
          source: ${{ matrix.action }}
          tag: ${{ steps.version.outputs.tag }}
          exclude: src node_modules tsconfig.json justfile dist
          move: dist/index.js:index.js

  release-composite:
    needs: detect
    if: needs.detect.outputs.composite != '[]'
    strategy:
      fail-fast: false
      matrix:
        action: ${{ fromJson(needs.detect.outputs.composite) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get tag
        id: version
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "tag=${{ matrix.action }}@v1" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ matrix.action }}/${{ github.ref_name }}@v1" >> $GITHUB_OUTPUT
          fi

      - uses: ./orphan-tag
        with:
          source: ${{ matrix.action }}
          tag: ${{ steps.version.outputs.tag }}
