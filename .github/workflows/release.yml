name: Release Actions

on:
  push:
  delete:
  workflow_dispatch:

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Delete branch tags
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./orphan-release/orphan-cleanup.sh --branch "${{ github.event.ref }}"

  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.find.outputs.node }}
      composite: ${{ steps.find.outputs.composite }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          node() {
            for d in */action.yml; do
              n=$(dirname "$d")
              [ -f "$n/package.json" ] && echo "$n"
            done
          }
          composite() {
            for d in */action.yml; do
              n=$(dirname "$d")
              [ ! -f "$n/package.json" ] && echo "$n"
            done
          }
          echo "node=$(node | jq -R | jq -sc)" >> $GITHUB_OUTPUT
          echo "composite=$(composite | jq -R | jq -sc)" >> $GITHUB_OUTPUT

  release-node:
    needs: detect
    if: needs.detect.outputs.node != '[]'
    strategy:
      fail-fast: false
      matrix:
        action: ${{ fromJson(needs.detect.outputs.node) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: extractions/setup-just@v2

      - name: Build
        working-directory: ${{ matrix.action }}
        run: just build

      - name: Create orphan tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          ./orphan-release/orphan-release.sh
          --source "${{ matrix.action }}"
          --exclude "src node_modules tsconfig.json justfile"
          --include-branch

  release-composite:
    needs: detect
    if: needs.detect.outputs.composite != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create orphan tags
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          for action in $(echo '${{ needs.detect.outputs.composite }}' | jq -r '.[]'); do
            ./orphan-release/orphan-release.sh --source "$action" --include-branch
          done

  all-checks-completed:
    if: always()
    needs: [cleanup, release-node, release-composite]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "cleanup: ${{ needs.cleanup.result }}"
          echo "release-node: ${{ needs.release-node.result }}"
          echo "release-composite: ${{ needs.release-composite.result }}"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
