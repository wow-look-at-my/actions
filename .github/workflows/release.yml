name: Release Actions

on:
  push:
  delete:
  workflow_dispatch:

jobs:
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: git fetch --tags
      - name: Delete branch tags
        run: |
          branch="${{ github.event.ref }}"
          git tag -l "*/$branch@*" | while read tag; do
            echo "Deleting tag: $tag"
            git push origin --delete "$tag" || true
          done

  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      actions: ${{ steps.find.outputs.actions }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          actions=$(find . -maxdepth 2 -name action.yml -exec dirname {} \; | while read dir; do
            if [ -f "$dir/package.json" ]; then
              basename "$dir"
            fi
          done | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "actions=$actions" >> $GITHUB_OUTPUT

  release:
    needs: detect
    if: needs.detect.outputs.actions != '[]'
    strategy:
      fail-fast: false
      matrix:
        action: ${{ fromJson(needs.detect.outputs.actions) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: extractions/setup-just@v2

      - name: Build
        working-directory: ${{ matrix.action }}
        run: just build

      - name: Get version and tag
        id: version
        run: |
          version=$(jq -r '.version | split(".")[0]' ${{ matrix.action }}/package.json)
          branch="${{ github.ref_name }}"
          if [ "$branch" = "master" ]; then
            tag="${{ matrix.action }}@v$version"
          else
            tag="${{ matrix.action }}/$branch@v$version"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - uses: ./orphan-tag
        with:
          source: ${{ matrix.action }}
          tag: ${{ steps.version.outputs.tag }}
          exclude: src node_modules tsconfig.json justfile dist
          move: dist/index.js:index.js
