name: GHCR Push
version: 1
description: Push container image to GHCR and prune old versions, keeping the last N tagged versions and their referenced untagged versions.

inputs:
  image:
    description: 'Full image reference to push (e.g., ghcr.io/owner/package:tag)'
    required: true
  token:
    description: 'GitHub token with packages:write and packages:read permissions'
    required: true
  keep:
    description: 'Number of tagged versions to keep'
    required: true
  prune:
    description: 'Whether to actually delete old versions (set to false for dry-run)'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: wow-look-at-my/actions@ghcr/steps/login#latest
      with:
        token: ${{ inputs.token }}

    - uses: wow-look-at-my/actions@ghcr/steps/push#latest
      with:
        image: ${{ inputs.image }}

    - uses: wow-look-at-my/actions@ghcr/steps/prune#latest
      with:
        image: ${{ inputs.image }}
        token: ${{ inputs.token }}
        keep: ${{ inputs.keep }}
        prune: ${{ inputs.prune }}
