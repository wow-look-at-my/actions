name: GHCR Push
version: 2
description: Push container image to GHCR and prune old versions, keeping the last N tagged versions and their referenced untagged versions.

inputs:
  image:
    description: 'Full image reference to push (e.g., ghcr.io/owner/package:tag)'
    required: true
  token:
    description: 'GitHub token with packages:write and packages:read permissions'
    required: true
  keep:
    description: 'Number of tagged versions to keep'
    required: true
  push:
    description: 'Whether to push the image (set to false to skip push and only prune)'
    required: false
    default: 'true'
  prune:
    description: 'Whether to actually delete old versions (set to false for dry-run)'
    required: false
    default: 'true'

runs:
  using: node24
  main: index.js
