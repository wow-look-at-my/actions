name: Cache rg
version: 1
description: Install ripgrep from apt with the .deb cached between runs (ubuntu-latest only)

outputs:
  cache-hit:
    description: 'Whether the ripgrep .deb was restored from cache'
    value: ${{ steps.cache.outputs.cache-hit }}
  path:
    description: 'Absolute path to the installed rg binary'
    value: ${{ steps.install.outputs.path }}

runs:
  using: composite
  steps:
    - name: Require ubuntu-latest (Linux/X64)
      if: runner.os != 'Linux' || runner.arch != 'X64'
      shell: bash
      run: |
        echo "::error::cache-rg only supports ubuntu-latest runners (Linux/X64); got ${{ runner.os }}/${{ runner.arch }}"
        exit 1

    - name: Restore ripgrep .deb from cache
      id: cache
      uses: actions/cache@v4
      with:
        path: /tmp/cache-rg/ripgrep.deb
        key: cache-rg-v1

    - name: Download ripgrep .deb
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p /tmp/cache-rg
        cd /tmp/cache-rg
        apt-get download ripgrep
        mv ripgrep_*.deb ripgrep.deb

    - name: Install rg
      id: install
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.local/bin"
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT
        dpkg-deb -x /tmp/cache-rg/ripgrep.deb "$tmpdir"
        install -m 0755 "$tmpdir/usr/bin/rg" "$HOME/.local/bin/rg"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "path=$HOME/.local/bin/rg" >> "$GITHUB_OUTPUT"
        "$HOME/.local/bin/rg" --version
