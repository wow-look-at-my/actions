name: Test cache-rg
version: 1
description: Dogfood cache-rg and assert rg is installed at the advertised path (never released)

runs:
  using: composite
  steps:
    - name: Install rg via cache-rg
      id: install
      uses: ./cache-rg

    - name: Verify rg works and is on PATH at the advertised location
      shell: bash
      run: |
        set -euo pipefail
        rg --version
        actual="$(command -v rg)"
        expected="${{ steps.install.outputs.path }}"
        if [ "$actual" != "$expected" ]; then
          echo "::error::rg on PATH ($actual) does not match advertised path ($expected)"
          exit 1
        fi
