name: Orphan Release
version: 1
description: Create orphan tag(s) from a directory

inputs:
  source:
    description: 'Source directory to package'
    required: true
  tags:
    description: 'Space-separated tag names (mutually exclusive with version)'
    required: false
    default: ''
  version:
    description: 'Version number to auto-generate tags (mutually exclusive with tags)'
    required: false
    default: ''
  exclude:
    description: 'Space-separated patterns to exclude'
    required: false
    default: ''
  message:
    description: 'Commit message (defaults to "Release {first_tag}")'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Create and push orphan tags
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        args=(--source "${{ inputs.source }}")
        [ -n "${{ inputs.tags }}" ] && args+=(--tags "${{ inputs.tags }}")
        [ -n "${{ inputs.version }}" ] && args+=(--version "${{ inputs.version }}")
        [ -n "${{ inputs.exclude }}" ] && args+=(--exclude "${{ inputs.exclude }}")
        [ -n "${{ inputs.message }}" ] && args+=(--message "${{ inputs.message }}")
        "${{ github.action_path }}/orphan-release.sh" "${args[@]}"
