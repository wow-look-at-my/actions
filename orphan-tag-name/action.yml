name: Orphan Tag Name
version: 1
description: Generate versioned and latest tag strings (e.g. "name#1 name")

inputs:
  path:
    description: 'Directory containing package.json or action.yml with version'
    required: true
  branch:
    description: 'Branch name (defaults to current branch)'
    required: false
    default: ''

outputs:
  tags:
    description: 'Space-separated versioned and latest tags'
    value: ${{ steps.generate.outputs.tags }}

runs:
  using: composite
  steps:
    - id: generate
      shell: bash
      run: |
        tags=$(${{ github.action_path }}/orphan-tag-name.sh --path "${{ inputs.path }}" --branch "${{ inputs.branch }}")
        echo "tags=$tags" >> $GITHUB_OUTPUT
