name: Orphan Tag Name
version: 1
description: Generate tag string in format name#version or name/branch#version

inputs:
  path:
    description: 'Directory containing package.json or action.yml with version'
    required: true
  branch:
    description: 'Branch name (defaults to current branch)'
    required: false
    default: ''

outputs:
  tag:
    description: 'Generated tag string'
    value: ${{ steps.generate.outputs.tag }}

runs:
  using: composite
  steps:
    - id: generate
      shell: bash
      run: |
        tag=$(${{ github.action_path }}/orphan-tag-name.sh --path "${{ inputs.path }}" --branch "${{ inputs.branch }}")
        echo "tag=$tag" >> $GITHUB_OUTPUT
