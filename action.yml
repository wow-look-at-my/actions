name: Docker Publish
version: 1
description: Build a Docker image and push it to GHCR, then prune old versions.

inputs:
  dockerfile:
    description: 'Path to the Dockerfile'
    required: true
  context:
    description: 'Docker build context directory'
    required: false
    default: '.'
  image:
    description: 'Full image name without tag (e.g., ghcr.io/owner/name)'
    required: true
  tag:
    description: 'Image tag'
    required: false
    default: 'latest'
  keep:
    description: 'Number of tagged versions to keep when pruning'
    required: false
    default: '10'
  prune:
    description: 'Whether to prune old versions'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - uses: wow-look-at-my/actions@ghcr-login#latest

    - name: Build and push
      shell: bash
      run: |
        docker buildx build \
          --file "${{ inputs.dockerfile }}" \
          --tag "${{ inputs.image }}:${{ inputs.tag }}" \
          --push \
          "${{ inputs.context }}"

    - uses: wow-look-at-my/actions@ghcr-prune#latest
      with:
        image: '${{ inputs.image }}:${{ inputs.tag }}'
        keep: ${{ inputs.keep }}
        prune: ${{ inputs.prune }}
