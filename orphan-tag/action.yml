name: Orphan Tag
description: Create orphan tag(s) from a directory with optional file transformations

inputs:
  source:
    description: 'Source directory to package'
    required: true
  tag:
    description: 'Tag name(s) to create, newline-separated'
    required: true
  exclude:
    description: 'Space-separated patterns to exclude'
    required: false
    default: ''
  move:
    description: 'Space-separated src:dst pairs to move files'
    required: false
    default: ''
  message:
    description: 'Commit message (defaults to "Release {first_tag}")'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Prepare content
      id: prepare
      shell: bash
      run: |
        tmpdir=$(mktemp -d)
        cp -r "${{ inputs.source }}"/* "$tmpdir/"
        for pattern in ${{ inputs.exclude }}; do rm -rf "$tmpdir"/$pattern 2>/dev/null || true; done
        for pair in ${{ inputs.move }}; do
          src="${pair%%:*}"; dst="${pair#*:}"
          [ -f "${{ inputs.source }}/$src" ] && mkdir -p "$(dirname "$tmpdir/$dst")" && cp "${{ inputs.source }}/$src" "$tmpdir/$dst"
        done
        echo "tmpdir=$tmpdir" >> $GITHUB_OUTPUT

    - name: Create orphan commit
      id: commit
      shell: bash
      run: |
        tmpdir="${{ steps.prepare.outputs.tmpdir }}"
        tags="${{ inputs.tag }}"
        msg="${{ inputs.message }}"
        [ -z "$msg" ] && msg="Release $(echo "$tags" | head -n1)"
        git -C "$tmpdir" init
        git -C "$tmpdir" config user.name "github-actions[bot]"
        git -C "$tmpdir" config user.email "github-actions[bot]@users.noreply.github.com"
        git -C "$tmpdir" add -A
        git -C "$tmpdir" commit -m "$msg"
        echo "sha=$(git -C "$tmpdir" rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Push tags
      shell: bash
      run: |
        git fetch "${{ steps.prepare.outputs.tmpdir }}" "${{ steps.commit.outputs.sha }}"
        echo "${{ inputs.tag }}" | while read -r tag; do
          [ -z "$tag" ] && continue
          git tag -f "$tag" "${{ steps.commit.outputs.sha }}"
          git push --force origin "$tag"
          echo "Created tag: $tag"
        done
