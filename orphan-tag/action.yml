name: Orphan Tag
version: 1
description: Create orphan tag(s) from a directory with optional file transformations

inputs:
  source:
    description: 'Source directory to package'
    required: true
  tags:
    description: 'Space-separated tag names to create'
    required: true
  exclude:
    description: 'Space-separated patterns to exclude'
    required: false
    default: ''
  move:
    description: 'Space-separated src:dst pairs to move files'
    required: false
    default: ''
  message:
    description: 'Commit message (defaults to "Release {first_tag}")'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Create and push orphan tags
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >
        ${{ github.action_path }}/orphan-tag.sh
        --source "${{ inputs.source }}"
        --tags "${{ inputs.tags }}"
        --exclude "${{ inputs.exclude }}"
        --move "${{ inputs.move }}"
        --message "${{ inputs.message }}"
